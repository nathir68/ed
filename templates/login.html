{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2 style="font-size: 32px; margin-bottom: 8px; text-align: center;">Welcome Back</h2>
    <p style="text-align: center; color: var(--color-text-light); margin-bottom: 32px;">Enter your credentials to access your account.</p>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" required>
        </div>
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label class="form-label" style="margin-bottom: 0;">Password</label>
                <a href="{{ url_for('forgot_password') }}" style="color: var(--color-primary); font-size: 14px; text-decoration: none;">Forgot Password?</a>
            </div>
            <input type="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>
</div>
{% endblock %}
