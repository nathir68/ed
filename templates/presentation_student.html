<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ presentation.title }} - Live Presentation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #viewer { width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="margin-bottom: 24px;">{{ presentation.title }}</h1>
    <p style="margin-bottom: 32px; font-size: 18px; color: #ccc;">This is a locked-down session. You must enter fullscreen to view the material.</p>
    <button id="enterBtn" class="btn btn-primary" style="font-size: 20px; padding: 16px 48px;">Enter Session</button>
</div>

<div id="viewer">
    {% if presentation.file_type in ['pdf'] %}
        <iframe src="{{ presentation.file_url }}#toolbar=0" width="100%" height="100%" style="border: none;"></iframe>
    {% elif presentation.file_type in ['jpg', 'jpeg', 'png'] %}
        <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
            <img src="{{ presentation.file_url }}" style="max-width: 100%; max-height: 100%;">
        </div>
    {% else %}
        <div style="color: white; text-align: center; margin-top: 100px;">File type not supported for live view.</div>
    {% endif %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const ROOM_CODE = '{{ presentation.room_code }}';
    const USER_NAME = '{{ user_name }}';
    
    const enterBtn = document.getElementById('enterBtn');
    const overlay = document.getElementById('overlay');
    const viewer = document.getElementById('viewer');
    
    enterBtn.addEventListener('click', async () => {
        try {
            if (document.documentElement.requestFullscreen) {
                await document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                await document.documentElement.webkitRequestFullscreen();
            }
            
            overlay.style.display = 'none';
            viewer.style.display = 'block';
            
            socket.emit('join_presentation', { room: ROOM_CODE, user_name: USER_NAME });
            
            setupTracking();
        } catch (err) {
            alert("Fullscreen permission is required to enter.");
        }
    });
    
    function setupTracking() {
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                socket.emit('focus_alert', { room: ROOM_CODE, user_name: USER_NAME, alert_type: 'tab_switch' });
            } else {
                socket.emit('focus_restored', { room: ROOM_CODE, user_name: USER_NAME });
            }
        });
        
        window.addEventListener('blur', () => {
            socket.emit('focus_alert', { room: ROOM_CODE, user_name: USER_NAME, alert_type: 'blur' });
        });
        
        window.addEventListener('focus', () => {
            socket.emit('focus_restored', { room: ROOM_CODE, user_name: USER_NAME });
        });
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                socket.emit('focus_alert', { room: ROOM_CODE, user_name: USER_NAME, alert_type: 'fullscreen_exit' });
                // Force them back out
                overlay.style.display = 'flex';
                viewer.style.display = 'none';
                document.querySelector('#overlay p').innerText = "You exited fullscreen. Click to re-enter and alert the teacher.";
            }
        });
    }
    
    socket.on('presentation_ended', (data) => {
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        document.body.innerHTML = '<div style="color: white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;"><h1>Session Ended</h1><p>The teacher has ended this presentation.</p><a href="/" class="btn btn-primary" style="margin-top:24px;">Return Home</a></div>';
    });
</script>
</body>
</html>
