{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 style="font-size: 24px; margin-bottom: 24px; text-align: center;">Reset Password</h2>
        <p style="text-align: center; color: var(--color-text-light); margin-bottom: 24px;">Create a new password for your account.</p>
        
        <form action="{{ url_for('reset_password') }}" method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="otp" value="{{ otp }}">
            
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-input" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
