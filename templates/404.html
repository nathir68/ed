{% extends 'base.html' %}

{% block title %}Page Not Found - EduConnect{% endblock %}

{% block content %}
<div class="page-container" style="padding-top: 80px; padding-bottom: 120px; display: flex; flex-direction: column; align-items: center; text-align: center;">
    <div style="width: 120px; height: 120px; border-radius: 50%; background: rgba(59, 130, 246, 0.1); color: var(--color-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 32px;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    
    <h1 style="font-size: 48px; margin-bottom: 16px;">404</h1>
    <h2 style="font-size: 24px; margin-bottom: 24px;">Oops! Page not found</h2>
    <p style="color: var(--color-text-light); font-size: 18px; max-width: 500px; line-height: 1.6; margin-bottom: 40px;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    
    <div style="display: flex; gap: 16px;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 12px 24px; font-size: 16px;">Go Back</a>
        <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 12px 24px; font-size: 16px;">Go to Homepage</a>
    </div>
</div>
{% endblock %}
