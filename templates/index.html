{% extends 'base.html' %}

{% block content %}
<section class="hero">
    <div class="page-container">
        <h1>Learn. Connect. <span>Succeed.</span></h1>
        <p>The simplest way for educators to share resources and host interactive sessions, all in one professional space.</p>
        
        <div style="display: flex; gap: 16px; justify-content: center;">
            <a href="{{ url_for('signup', role='teacher') }}" class="btn btn-primary">Join as Educator</a>
            <a href="{{ url_for('signup', role='student') }}" class="btn btn-secondary">Join as Student</a>
        </div>
    </div>
</section>

<section style="padding: 80px 0; background: var(--color-bg); border-top: 1px solid var(--color-border);">
    <div class="page-container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px; text-align: center;">
            <div class="stat-card">
                <div class="stat-value text-primary">50k+</div>
                <div class="stat-label">Active Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">100k</div>
                <div class="stat-label">Resources</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">5k+</div>
                <div class="stat-label">Institutions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value text-primary">99%</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
