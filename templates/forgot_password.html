{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 style="font-size: 24px; margin-bottom: 24px; text-align: center;">Forgot Password</h2>
        <p style="text-align: center; color: var(--color-text-light); margin-bottom: 24px;">Enter your email address and we'll send you an OTP to reset your password.</p>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Send OTP</button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="{{ url_for('login') }}" style="color: var(--color-primary); text-decoration: none; font-size: 14px;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
