{% extends 'base.html' %}

{% block content %}
<div class="dashboard-layout">
    <aside class="sidebar">
        <div style="margin-bottom: 32px;">
            <h3 style="font-size: 14px; color: var(--color-text-light); text-transform: uppercase; letter-spacing: 1px;">Educator</h3>
            <p style="font-weight: 700; font-size: 18px;">{{ session.get('user_name') }}</p>
        </div>
        <a href="{{ url_for('teacher_dashboard') }}" class="sidebar-link">Overview</a>
        <a href="{{ url_for('teacher_upload') }}" class="sidebar-link active">Upload Resource</a>
        <a href="{{ url_for('teacher_classes') }}" class="sidebar-link">Live Sessions</a>
    </aside>
    
    <div class="main-content">
        <div style="max-width: 800px;">
            <h1 style="font-size: 36px; margin-bottom: 8px;">Upload Resource</h1>
            <p style="color: var(--color-text-light); margin-bottom: 48px;">Share study materials securely with your students.</p>
            
            <div style="background: var(--color-white); border: 1px solid var(--color-border); border-radius: 24px; padding: 48px;">
                <form method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="form-label">Resource Title</label>
                        <input type="text" name="title" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" class="form-input" value="{{ session.get('user_subject', '') }}" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <div class="form-group">
                            <label class="form-label">Department</label>
                            <select name="department_id" id="department_id" class="form-input" required>
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Target Year of Study</label>
                            <select name="year_of_study" class="form-input" required>
                                <option value="">Select Year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-input" rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Tags (comma separated)</label>
                        <input type="text" name="tags" class="form-input" placeholder="e.g. physics, thermodynamics">
                    </div>
                    
                    <div class="form-group" style="margin-top: 32px; padding: 32px; border: 2px dashed var(--color-border); border-radius: 16px; text-align: center;">
                        <label class="form-label" style="margin-bottom: 16px;">Select File</label>
                        <input type="file" name="file" required style="font-size: 16px;">
                        <p style="color: var(--color-text-light); font-size: 14px; margin-top: 16px;">Supported: PDF, DOCX, PPT, JPG, PNG</p>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="font-size: 18px; padding: 16px 32px;">Upload Resource</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const departmentSelect = document.getElementById('department_id');
    const collegeId = "{{ college_id }}";
    
    if (collegeId && collegeId !== 'None') {
        fetch('/api/departments/' + collegeId)
            .then(response => response.json())
            .then(data => {
                departmentSelect.innerHTML = '<option value="">Select a Department</option>';
                data.departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.id;
                    option.textContent = dept.name;
                    departmentSelect.appendChild(option);
                });
            })
            .catch(err => {
                departmentSelect.innerHTML = '<option value="">Error loading</option>';
            });
    } else {
        departmentSelect.innerHTML = '<option value="">No College Assigned</option>';
    }
});
</script>
{% endblock %}
