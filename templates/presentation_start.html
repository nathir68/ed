{% extends 'base.html' %}
{% block content %}
<div class="page-container" style="max-width: 600px; padding-top: 48px;">
    <a href="javascript:history.back()" class="btn btn-secondary" style="display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0; border-radius: 50%; margin-bottom: 24px;" title="Go Back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <h1 style="font-size: 32px; margin-bottom: 24px;">Start Live Presentation</h1>
    <div style="background: var(--color-white); border: 1px solid var(--color-border); border-radius: 24px; padding: 48px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);">
        <p style="margin-bottom: 24px;">You are about to start a live, locked-down presentation for <strong>{{ resource.title }}</strong>.</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Duration (minutes)</label>
                <input type="number" name="duration" class="form-input" value="45" min="1" max="180" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Create Live Session</button>
        </form>
    </div>
</div>
{% endblock %}
